<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sistema Solar AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
 <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <script src="script.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 999;
    }
  </style>
</head>

<body>

<div id="info">
  Clique em um planeta
</div>

<a-scene embedded arjs cursor="rayOrigin: mouse">

  <!-- Marcador Hiro -->
  <a-marker preset="hiro">

    <!-- SOL -->
    <a-sphere
      id="sol"
      position="0 0.5 0"
      radius="0.4"
      color="yellow">
    </a-sphere>

    <!-- MERCÚRIO -->
    <a-sphere
      class="planeta"
      id="mercurio"
      position="1 0.3 0"
      radius="0.08"
      color="gray"
      animation="property: rotation;
                 to: 0 360 0;
                 loop: true;
                 dur: 4000">
    </a-sphere>

    <!-- VÊNUS -->
    <a-sphere
      class="planeta"
      id="venus"
      position="1.5 0.3 0"
      radius="0.1"
      color="orange"
      animation="property: rotation;
                 to: 0 360 0;
                 loop: true;
                 dur: 5000">
    </a-sphere>

    <!-- TERRA -->
    <a-sphere
      class="planeta"
      id="terra"
      position="2 0.3 0"
      radius="0.12"
      color="blue"
      animation="property: rotation;
                 to: 0 360 0;
                 loop: true;
                 dur: 6000">
    </a-sphere>

    <!-- MARTE -->
    <a-sphere
      class="planeta"
      id="marte"
      position="2.5 0.3 0"
      radius="0.1"
      color="red"
      animation="property: rotation;
                 to: 0 360 0;
                 loop: true;
                 dur: 7000">
    </a-sphere>

    <a-entity
        class="planeta"
        id="saturno"
        position="3 0.3 0">

        <a-sphere
            radius="0.15"
            color="#d2b48c">
        </a-sphere>

        <a-torus
            radius="0.22"
            radius-tubular="0.01"
            rotation="90 0 0"
            color="gray">
        </a-torus>

        </a-entity>

  </a-marker>

  <!-- câmera -->
  <a-entity camera>

  <a-cursor
    fuse="false"
    raycaster="objects: .planeta">
  </a-cursor>

</a-entity>

</a-scene>

</body>
</html>
